name: sql-debug-env
version: "1.0.0"
description: >
  A real-world environment for training and evaluating AI agents
  on SQL debugging and optimization tasks.

tags:
  - sql
  - databases
  - debugging
  - openenv

tasks:
  - id: easy
    name: Syntax repair
    difficulty: easy
    max_steps: 10
    reward_range: [0.0, 1.0]
  - id: medium
    name: Join logic fix
    difficulty: medium
    max_steps: 10
    reward_range: [0.0, 1.0]
  - id: hard
    name: Performance optimization
    difficulty: hard
    max_steps: 10
    reward_range: [0.0, 1.0]

server:
  entry_point: main:main
  module: server.api:main

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: GET /grader
  baseline: GET /baseline